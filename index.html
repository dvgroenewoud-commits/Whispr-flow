<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispr Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c10;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6aff;
    --accent2: #b8a8ff;
    --glow: rgba(124,106,255,0.25);
    --text: #e8e6f0;
    --muted: rgba(232,230,240,0.45);
    --danger: #ff6b6b;
    --green: #6bffb8;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 80%, rgba(124,106,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 20%, rgba(184,168,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 32px 0 24px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo span {
    color: var(--accent2);
  }

  .badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
    margin-left: auto;
  }

  /* Transcript area */
  .transcript-area {
    overflow-y: auto;
    padding: 8px 0 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .transcript-area::-webkit-scrollbar { width: 4px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.04em;
    text-align: center;
    padding: 40px 0;
  }

  .empty-icon {
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.5;
  }

  /* Transcript entry */
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .entry::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent), transparent);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .entry-time {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .entry-lang {
    font-size: 10px;
    color: var(--accent2);
    background: rgba(124,106,255,0.12);
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.06em;
  }

  .entry-duration {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .entry-text {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    line-height: 1.65;
    color: var(--text);
    font-style: italic;
  }

  .entry-text.processing {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-style: normal;
    color: var(--muted);
  }

  .entry-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-icon:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
    background: var(--surface2);
  }

  .btn-icon.danger:hover {
    color: var(--danger);
    border-color: rgba(255,107,107,0.3);
  }

  /* Bottom controls */
  .controls {
    padding: 16px 0 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    border-top: 1px solid var(--border);
  }

  /* Waveform visualizer */
  .visualizer {
    width: 100%;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .visualizer.active { opacity: 1; }

  .bar {
    width: 3px;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    transition: height 0.08s ease;
  }

  /* Record button */
  .record-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .btn-record {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid rgba(124,106,255,0.4);
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
    box-shadow: 0 0 0 0 var(--glow);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-record:hover {
    border-color: var(--accent);
    box-shadow: 0 0 24px var(--glow);
    transform: scale(1.04);
  }

  .btn-record.recording {
    border-color: var(--danger);
    box-shadow: 0 0 0 6px rgba(255,107,107,0.12), 0 0 32px rgba(255,107,107,0.2);
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(255,107,107,0.12), 0 0 32px rgba(255,107,107,0.2); }
    50% { box-shadow: 0 0 0 12px rgba(255,107,107,0.06), 0 0 40px rgba(255,107,107,0.25); }
  }

  .record-icon { transition: all 0.2s; }
  .dot-idle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    transition: all 0.2s;
  }

  .dot-stop {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    background: var(--danger);
  }

  .record-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 80px;
  }

  .timer {
    font-size: 22px;
    color: var(--text);
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    min-width: 80px;
    text-align: right;
  }

  .timer.hidden { opacity: 0; }

  /* Status bar */
  .status {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
    height: 16px;
  }

  .status .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: blink 1s step-start infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Thinking dots */
  .thinking::after {
    content: '';
    animation: dots 1.2s steps(3,end) infinite;
  }

  @keyframes dots {
    0% { content: '.'; }
    33% { content: '..'; }
    66% { content: '...'; }
  }

  /* Scrollbar style */
  * { scrollbar-width: thin; }

  /* Copy feedback */
  .copied {
    color: var(--green) !important;
    border-color: rgba(107,255,184,0.3) !important;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Whispr<span>Flow</span></div>
    <span class="badge">v1.0 · Claude AI</span>
  </header>

  <div class="transcript-area" id="transcriptArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/>
        </svg>
      </div>
      <div>Druk op de knop en begin te spreken</div>
      <div style="font-size:11px; opacity:0.6;">Je opname wordt automatisch getranscribeerd</div>
    </div>
  </div>

  <div class="controls">
    <div class="visualizer" id="visualizer">
      <!-- bars generated by JS -->
    </div>

    <div class="record-row">
      <div class="timer hidden" id="timer">0:00</div>
      <button class="btn-record" id="recordBtn" title="Start opname">
        <span class="record-icon" id="recordIcon">
          <div class="dot-idle" id="recordDot"></div>
        </span>
      </button>
      <div class="record-label" id="recordLabel">Opnemen</div>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
const recordBtn = document.getElementById('recordBtn');
const recordLabel = document.getElementById('recordLabel');
const recordDot = document.getElementById('recordDot');
const timer = document.getElementById('timer');
const status = document.getElementById('status');
const visualizer = document.getElementById('visualizer');
const transcriptArea = document.getElementById('transcriptArea');
const emptyState = document.getElementById('emptyState');

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let timerInterval = null;
let seconds = 0;
let audioCtx = null;
let analyser = null;
let animFrame = null;
let stream = null;
let recordingStart = null;
const NUM_BARS = 32;

// Build visualizer bars
for (let i = 0; i < NUM_BARS; i++) {
  const bar = document.createElement('div');
  bar.className = 'bar';
  visualizer.appendChild(bar);
}
const bars = visualizer.querySelectorAll('.bar');

function updateTimer() {
  seconds++;
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  timer.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function startVisualizer(streamInput) {
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  const src = audioCtx.createMediaStreamSource(streamInput);
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    animFrame = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    bars.forEach((bar, i) => {
      const val = data[i] || 0;
      const h = Math.max(4, (val / 255) * 42);
      bar.style.height = h + 'px';
      bar.style.opacity = 0.4 + (val / 255) * 0.6;
    });
  }
  draw();
}

function stopVisualizer() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (audioCtx) audioCtx.close();
  bars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.4'; });
}

async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    setStatus('❌ Microfoontoegang geweigerd');
    return;
  }

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = handleStop;
  mediaRecorder.start(100);

  isRecording = true;
  recordingStart = Date.now();
  seconds = 0;
  timer.textContent = '0:00';
  timer.classList.remove('hidden');
  timerInterval = setInterval(updateTimer, 1000);

  recordBtn.classList.add('recording');
  recordDot.className = 'dot-stop';
  recordLabel.textContent = 'Stoppen';
  visualizer.classList.add('active');
  startVisualizer(stream);
  setStatus('<span class="dot"></span>Opname actief...');
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    stream.getTracks().forEach(t => t.stop());
    clearInterval(timerInterval);
    isRecording = false;

    recordBtn.classList.remove('recording');
    recordDot.className = 'dot-idle';
    recordLabel.textContent = 'Opnemen';
    timer.classList.add('hidden');
    visualizer.classList.remove('active');
    stopVisualizer();
    setStatus('Verwerken...');
  }
}

async function handleStop() {
  const duration = ((Date.now() - recordingStart) / 1000).toFixed(1);
  const blob = new Blob(audioChunks, { type: 'audio/webm' });

  // Show processing entry
  const entryId = 'entry-' + Date.now();
  addEntry(entryId, null, duration, true);
  emptyState.style.display = 'none';

  // Convert to base64
  const reader = new FileReader();
  reader.readAsDataURL(blob);
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'document',
                source: { type: 'base64', media_type: 'audio/webm', data: base64 }
              },
              {
                type: 'text',
                text: `Transcribeer precies wat er in deze audio gezegd wordt en detecteer de taal.
Geef je antwoord ALLEEN als geldig JSON in dit formaat, zonder uitleg, zonder markdown backticks:
{"text": "de getranscribeerde tekst hier", "language": "Nederlandse taalcode", "languageName": "Volledige taalnaam in het Nederlands", "confidence": "hoog|gemiddeld|laag"}

Als er niets te horen is: {"text": "[geen spraak gedetecteerd]", "language": "?", "languageName": "Onbekend", "confidence": "laag"}

Gebruik ISO 639-1 codes voor language (bijv. "nl", "en", "de", "fr", "es", "pt", "it", "pl", "ar", "zh", etc.).`
              }
            ]
          }]
        })
      });

      const data = await response.json();
      let text = '[fout bij verwerking]';
      let language = '?';
      let languageName = 'Onbekend';
      let confidence = 'laag';

      if (data.content && data.content[0]) {
        try {
          const raw = data.content[0].text.replace(/```json|```/g, '').trim();
          const parsed = JSON.parse(raw);
          text = parsed.text || '[geen tekst]';
          language = parsed.language || '?';
          languageName = parsed.languageName || language;
          confidence = parsed.confidence || 'laag';
        } catch {
          text = data.content[0].text || '[fout bij verwerking]';
        }
      }

      updateEntry(entryId, text, language, languageName, confidence);
      setStatus('');
    } catch (err) {
      updateEntry(entryId, '[verbindingsfout — controleer netwerk]', '?', 'Onbekend', 'laag');
      setStatus('');
    }
  };
}

function addEntry(id, text, duration, processing = false) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });

  const div = document.createElement('div');
  div.className = 'entry';
  div.id = id;
  div.innerHTML = `
    <div class="entry-meta">
      <span class="entry-time">${timeStr}</span>
      <span class="entry-lang" id="lang-${id}">
        ${processing ? '<span style="opacity:0.4">detecteren…</span>' : 'NL/EN'}
      </span>
      <span class="entry-duration">${duration}s</span>
    </div>
    <div class="entry-text ${processing ? 'processing thinking' : ''}" id="text-${id}">
      ${processing ? 'Transcriptie bezig' : escapeHtml(text)}
    </div>
    ${!processing ? `
    <div class="entry-actions">
      <button class="btn-icon" onclick="copyText('${id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Kopiëren
      </button>
      <button class="btn-icon danger" onclick="deleteEntry('${id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Verwijder
      </button>
    </div>` : ''}
  `;
  transcriptArea.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// Language flag/color map
const langColors = {
  nl: { bg: 'rgba(255,166,0,0.15)', color: '#ffb740' },
  en: { bg: 'rgba(59,130,246,0.15)', color: '#60a5fa' },
  de: { bg: 'rgba(255,220,50,0.15)', color: '#ffd700' },
  fr: { bg: 'rgba(59,130,246,0.15)', color: '#74b4ff' },
  es: { bg: 'rgba(255,90,0,0.13)', color: '#ff7a35' },
  pt: { bg: 'rgba(0,180,80,0.13)', color: '#4ade80' },
  it: { bg: 'rgba(0,180,80,0.13)', color: '#6ee7b7' },
  pl: { bg: 'rgba(220,38,38,0.15)', color: '#f87171' },
  ar: { bg: 'rgba(0,160,100,0.13)', color: '#34d399' },
  zh: { bg: 'rgba(220,38,38,0.13)', color: '#f87171' },
  ja: { bg: 'rgba(220,38,38,0.13)', color: '#fda4af' },
  ko: { bg: 'rgba(59,130,246,0.13)', color: '#93c5fd' },
};

function getLangStyle(code) {
  const c = langColors[code?.toLowerCase()] || { bg: 'rgba(124,106,255,0.12)', color: '#b8a8ff' };
  return `background:${c.bg}; color:${c.color};`;
}

function updateEntry(id, text, language = '?', languageName = 'Onbekend', confidence = 'laag') {
  const textEl = document.getElementById('text-' + id);
  if (textEl) {
    textEl.className = 'entry-text';
    textEl.textContent = text;
  }

  // Update language badge
  const langEl = document.getElementById('lang-' + id);
  if (langEl) {
    const confDot = confidence === 'hoog' ? '●' : confidence === 'gemiddeld' ? '◐' : '○';
    langEl.style = getLangStyle(language);
    langEl.innerHTML = `<span title="${languageName} · zekerheid: ${confidence}">${language.toUpperCase()} ${confDot}</span>`;
    langEl.title = `${languageName} — zekerheid: ${confidence}`;
  }
  // Add actions
  const entry = document.getElementById(id);
  if (entry && !entry.querySelector('.entry-actions')) {
    const actions = document.createElement('div');
    actions.className = 'entry-actions';
    actions.innerHTML = `
      <button class="btn-icon" onclick="copyText('${id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Kopiëren
      </button>
      <button class="btn-icon danger" onclick="deleteEntry('${id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Verwijder
      </button>
    `;
    entry.appendChild(actions);
  }
}

function copyText(id) {
  const textEl = document.getElementById('text-' + id);
  if (textEl) {
    navigator.clipboard.writeText(textEl.textContent).then(() => {
      const btn = document.querySelector(`#${id} .btn-icon`);
      if (btn) {
        btn.classList.add('copied');
        btn.textContent = '✓ Gekopieerd';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Kopiëren`;
        }, 2000);
      }
    });
  }
}

function deleteEntry(id) {
  const el = document.getElementById(id);
  if (el) {
    el.style.opacity = '0';
    el.style.transform = 'translateX(12px)';
    el.style.transition = 'all 0.25s ease';
    setTimeout(() => {
      el.remove();
      if (!transcriptArea.querySelector('.entry')) {
        emptyState.style.display = 'flex';
      }
    }, 250);
  }
}

function setStatus(html) {
  status.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

recordBtn.addEventListener('click', () => {
  if (isRecording) stopRecording();
  else startRecording();
});

// Init empty state
emptyState.style.display = 'flex';
